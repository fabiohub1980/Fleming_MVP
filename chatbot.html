function mdRender(txt){

    fb.innerHTML = (escalated?'<span class="flm-tag" style="background:#fff1df;color:#b97316">Escalado -> email + CRM</span>':'')
      + '<span>Util?</span><button data-v="up">&#128077;</button><button data-v="down">&#128078;</button><span class="flm-thanks" style="display:none">Gracias!</span>';
    var thanks=fb.querySelector(".flm-thanks");
    var btns=fb.querySelectorAll("button");
    for(var i=0;i<btns.length;i++){ btns[i].onclick=function(){ thanks.style.display="inline"; }; }
    wrap.appendChild(fb);
  }
  msgsEl.appendChild(wrap); scrollDown();
}
function addEmailCard(email){
  var card=document.createElement("div"); card.className="flm-email-card";
  var autosend = !!CONFIG.webhookUrl;
  card.innerHTML=
    '<div class="flm-email-head">&#128231; Correo para el Dpto. Cientifico</div>'+
    '<div class="flm-email-body">'+
      '<div><span class="lbl">Para:</span> '+esc(email.to)+'</div>'+
      '<div><span class="lbl">Asunto:</span> '+esc(email.subject)+'</div>'+
      '<div class="txt">'+esc(email.body)+'</div>'+
      '<div class="flm-sendstatus" style="margin-top:8px;font-weight:600;color:#94a3b8">'+(autosend?'&#8987; Enviando automaticamente...':'&#9755; Pulsa "Enviar correo" (o configura el webhook de Make para envio automatico)')+'</div>'+
    '</div>'+
    '<div class="flm-email-actions">'+
      '<a class="flm-btn-primary" href="'+mailtoUrl(email)+'" target="_blank" rel="noopener">&#128231; Enviar correo</a>'+
      '<button class="flm-btn-soft">&#128203; Copiar</button>'+
    '</div>';
  var copyBtn=card.querySelector(".flm-btn-soft");
  copyBtn.onclick=function(){
    var t="Para: "+email.to+"\nAsunto: "+email.subject+"\n\n"+email.body;
    if(navigator.clipboard) navigator.clipboard.writeText(t);
    copyBtn.innerHTML="&#10003; Copiado"; setTimeout(function(){copyBtn.innerHTML="&#128203; Copiar";},1500);
  };
  var sendA=card.querySelector(".flm-btn-primary");
  sendA.addEventListener("click",function(){ try{ window.open(mailtoUrl(email),"_blank"); }catch(e){} });
  msgsEl.appendChild(card); scrollDown();
  return card;
}
function addTyping(){
  var t=document.createElement("div"); t.className="flm-row bot"; t.id="flm-typing";
  t.innerHTML='<div class="flm-typing"><span></span><span></span><span></span></div>';
  msgsEl.appendChild(t); scrollDown();
}
function rmTyping(){ var t=document.getElementById("flm-typing"); if(t) t.remove(); }
function scrollDown(){ msgsEl.scrollTop=msgsEl.scrollHeight; }

/* ---------- badge / panel ---------- */
function refreshBadge(){
  var n=0; for(var i=0;i<log.length;i++){ if(log[i].escala) n++; }
  badgeEl.textContent=n; badgeEl.style.display = n>0?"flex":"none";
}
function openPanel(){
  var mount=document.getElementById("flm-panel-mount");
  var rows;
  if(log.length){
    rows = log.map(function(e){
      var tags='<div class="flm-metatags">'+
        '<span class="flm-tag" style="background:#eef4fb;color:#16407e">'+(CAT_LABEL[e.categoria]||e.categoria)+'</span>'+
        '<span class="flm-tag" style="'+(e.respondible?'background:#e0f2ef;color:#0d8a7a':'background:#fdeceb;color:#c0392b')+'">'+(e.respondible?'respondible':'no respondible')+'</span>'+
        '<span class="flm-tag" style="'+(RISK_STYLE[e.riesgo]||RISK_STYLE.bajo)+'">riesgo '+e.riesgo+'</span>'+
      '</div>';
      var emailBlock = (e.escala&&e.email)?
        '<div style="padding:10px 12px;background:#fafcff">'+
          '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;color:#16407e;font-size:12px;font-weight:600">&#128231; Email generado</div>'+
          '<div class="flm-mono" style="font-size:11px;color:#334155">'+
            '<div><span style="color:#94a3b8">Para:</span> '+esc(e.email.to)+'</div>'+
            '<div><span style="color:#94a3b8">Asunto:</span> '+esc(e.email.subject)+'</div>'+
            '<div style="white-space:pre-wrap;margin-top:4px">'+esc(e.email.body)+'</div>'+
          '</div>'+
          '<div style="display:flex;gap:8px;margin-top:10px"><a class="flm-btn-primary" href="'+mailtoUrl(e.email)+'" target="_blank" rel="noopener">&#128231; Abrir en correo</a></div>'+
        '</div>':'';
      return '<div class="flm-card"><div class="flm-card-top">'+tags+'<div style="font-size:12px;color:#475569"><span style="color:#94a3b8">Consulta:</span> '+esc(e.consulta)+'</div></div>'+emailBlock+'</div>';
    }).join("");
  } else {
    rows = '<div class="flm-empty">Aqui se registra la accion interna de cada consulta (categoria - respondible - riesgo). Cuando escala, se genera el email al Dpto. Cientifico.</div>';
  }
  mount.innerHTML='<div class="flm-overlay" id="flm-ov">'+
    '<div class="flm-panel">'+
      '<div class="flm-panel-head"><span style="font-weight:600;font-size:14px">&#128229; Accion interna - registro de turnos</span><button class="x" id="flm-close">&#10005;</button></div>'+
      '<div class="flm-panel-body">'+rows+'</div>'+
    '</div>'+
  '</div>';
  document.getElementById("flm-ov").onclick=function(e){ if(e.target.id==="flm-ov") mount.innerHTML=""; };
  document.getElementById("flm-close").onclick=function(){ mount.innerHTML=""; };
}

/* ---------- envio ---------- */
function send(text){
  var q=(text!=null?text:textEl.value).trim();
  if(!q||loading) return;
  editId=false; renderIdBar();
  addUser(q);
  messages.push({role:"user",content:q});
  textEl.value=""; loading=true; sendBtn.disabled=true; addTyping();

  var history=messages.map(function(m){ return {role:m.role,content:m.content.split(META)[0].trim()}; });
  var contents=history.map(function(m){ return {role:(m.role==="assistant"?"model":"user"), parts:[{text:m.content}]}; });
  var endpoint = CONFIG.apiEndpoint;
  fetch(endpoint,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({system_instruction:{parts:[{text:SYSTEM_PROMPT}]},contents:contents,generationConfig:{maxOutputTokens:CONFIG.maxTokens},safetySettings:[{category:"HARM_CATEGORY_HARASSMENT",threshold:"BLOCK_NONE"},{category:"HARM_CATEGORY_HATE_SPEECH",threshold:"BLOCK_NONE"},{category:"HARM_CATEGORY_SEXUALLY_EXPLICIT",threshold:"BLOCK_NONE"},{category:"HARM_CATEGORY_DANGEROUS_CONTENT",threshold:"BLOCK_NONE"}]})
  }).then(function(res){ return res.json(); }).then(function(data){
    var _c=(data.candidates&&data.candidates[0])||null;
    var _parts=(_c&&_c.content&&_c.content.parts)||[];
    var raw=(_parts.map(function(p){return p.text||"";}).join("\n").trim());
    if(!raw){
      rmTyping();
      var _err=data.error||{};
      var _fr=(_c&&_c.finishReason)||"";
      var msg;
      if(_err.code===429||/RESOURCE_EXHAUSTED|quota|rate|too many/i.test((_err.status||"")+" "+(_err.message||""))){
        msg="El asistente ha alcanzado el limite de uso gratuito por ahora. Espera unos segundos e intentalo de nuevo.";
      } else if(_fr==="SAFETY"){
        msg="No puedo responder a esa consulta en este momento.";
      } else {
        msg="No he podido generar una respuesta. Intentalo de nuevo en un momento.";
      }
      addBot(msg,false);
      return;
    }

    var parts=raw.split(META);
    var clientText=(parts[0]||"").trim();
    var meta=null; if(parts[1]){ try{ meta=JSON.parse(parts[1].trim()); }catch(e){} }
    var escala = meta? !!meta.escala : clientText.indexOf(ESCALATION_PHRASE)!==-1;
    var categoria = (meta&&meta.categoria)||(escala?"fuera_de_alcance":"posologia");
    var riesgo = (meta&&meta.riesgo)||(categoria==="seguridad_interacciones"?"alto":"bajo");
    var respondible = meta? !!meta.respondible : !escala;

    rmTyping();
    messages.push({role:"assistant",content:clientText});
    addBot(clientText, escala);

    var email = escala? buildEmail(categoria,q) : null;
    var entry = {ticket_id:"FLM-"+Date.now(), ts:new Date().toISOString(), consulta:q, categoria:categoria, respondible:respondible, riesgo:riesgo, escala:escala, email:email};
    if(escala && email){
      var card = addEmailCard(email);
      var status = card.querySelector(".flm-sendstatus");
      if(CONFIG.webhookUrl){
        postToMake(entry).then(function(){
          status.innerHTML="&#10003; Enviado al Dpto. Cientifico (via Make)"; status.style.color="#0d8a7a";
        }).catch(function(){
          status.innerHTML="&#9888; No se pudo enviar automaticamente. Usa 'Enviar correo'."; status.style.color="#c0392b";
        });
      }
    }
    log.unshift(entry);
    refreshBadge();
  }).catch(function(err){
    rmTyping();
    addBot("Ha ocurrido un error de conexion. Intentalo de nuevo en un momento.", false);
  }).then(function(){
    loading=false; sendBtn.disabled=false;
  });
}

/* ---------- eventos ---------- */
sendBtn.onclick=function(){ send(); };
textEl.addEventListener("keydown",function(e){ if(e.key==="Enter") send(); });
document.getElementById("flm-open-panel").onclick=openPanel;
document.getElementById("flm-reset").onclick=function(){
  messages=[]; log=[]; refreshBadge(); msgsEl.innerHTML="";
  addBot("Hola, soy **Fleming**, tu asistente cientifico de Fab Pharma para Mag-nifico. Preguntame sobre composicion, posologia, tolerabilidad o uso. Respondo solo con documentacion validada.", false);
};
